<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AirMesh Monitor</title>
<link rel ="stylesheet" href="mesh-dashboard.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/5.3.4/mqtt.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
</head>
<body>

<!-- Config Modal -->
<div class="modal-overlay" id="config-modal">
  <div class="modal">
    <h2>BROKER CONFIG</h2>
    <div class="form-group">
      <label>HiveMQ WebSocket URL</label>
      <input type="text" id="cfg-url" value="wss://5d06f91f99b9410e89ba2a03fb2df821.s1.eu.hivemq.cloud:8884/mqtt" />
    </div>
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="cfg-user" placeholder="your_username" />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="cfg-pass" placeholder="your_password" />
    </div>
    <div class="modal-btns">
      <button class="cancel-btn" onclick="closeModal()">Cancel</button>
      <button class="push-btn" onclick="connectMQTT()">Connect</button>
    </div>
  </div>
</div>

<!-- Header -->
<div class="header">
  <div class="logo">Air<span>Mesh</span> Monitor</div>
  <div class="status-bar">
    <div><span class="dot" id="conn-dot"></span><span id="conn-label">DISCONNECTED</span></div>
    <div id="node-count">0 NODES</div>
    <div id="clock">--:--:--</div>
  </div>
  <button class="connect-btn" id="conn-btn" onclick="toggleConnect()">Connect</button>
</div>

<!-- Main Grid -->
<div class="grid">

  <!-- Topology -->
  <div class="panel topology-panel">
    <div class="panel-header">
      <div class="panel-title">Mesh Topology</div>
      <div class="badge" id="topo-count">0 nodes</div>
    </div>
    <svg id="topology-svg"></svg>
  </div>

  <!-- Node Cards -->
  <div class="panel nodes-panel">
    <div class="panel-header">
      <div class="panel-title">Live Sensor Data</div>
      <div class="badge" id="sensor-count">0 active</div>
    </div>
    <div id="node-cards">
      <div class="empty-state">
        <div class="icon">📡</div>
        <div>Connect to broker to see live data</div>
      </div>
    </div>
  </div>

  <!-- Threshold Config -->
  <div class="panel threshold-panel" style="grid-column: 2;">
    <div class="panel-header">
      <div class="panel-title">Alert Threshold Config</div>
    </div>
    <div class="threshold-form">
      <div class="form-group">
        <label>Target Node</label>
        <select id="thresh-target">
          <option value="all">All Nodes</option>
        </select>
      </div>
      <div class="form-group">
        <label>Temp Max (°C)</label>
        <input type="number" id="thresh-temp" value="35" min="0" max="100" />
      </div>
      <div class="form-group">
        <label>Smoke Max (%)</label>
        <input type="number" id="thresh-smoke" value="40" min="0" max="100" />
      </div>
      <div style="display:flex; gap:8px;">
        <button class="push-btn" id="push-btn" onclick="pushThreshold()" disabled>Push</button>
      </div>
    </div>
    <div class="log-panel" id="log-panel">
      <div class="log-entry"><span class="time">--:--:--</span><span class="msg">Waiting for connection...</span></div>
    </div>
  </div>

  <!-- Active Alerts -->
  <div class="panel alert-panel" style="grid-column: 2;">
    <div class="panel-header">
      <div class="panel-title">⚠️ Active Alerts</div>
      <div class="badge alert-badge" id="alert-count">0 alerts</div>
    </div>
    <div id="alert-list">
      <div class="empty-state">
        <div class="icon">✅</div>
        <div>No active alerts</div>
      </div>
    </div>
  </div>

</div>

<script>
// ── State ─────────────────────────────────────────────────────
let client = null;
let nodes = {};
let alerts = {};
let isConnected = false;
let mqttConfig = { url: '', user: '', pass: '' };

// ── Clock ─────────────────────────────────────────────────────
setInterval(() => {
  document.getElementById('clock').textContent =
    new Date().toTimeString().slice(0, 8);
}, 1000);

// ── Modal ─────────────────────────────────────────────────────
function closeModal() {
  document.getElementById('config-modal').style.display = 'none';
}
function toggleConnect() {
  if (isConnected) disconnect();
  else document.getElementById('config-modal').style.display = 'flex';
}

// ── MQTT ──────────────────────────────────────────────────────
function connectMQTT() {
  const url  = document.getElementById('cfg-url').value.trim();
  const user = document.getElementById('cfg-user').value.trim();
  const pass = document.getElementById('cfg-pass').value.trim();
  if (!url || !user || !pass) { alert('Fill in all fields'); return; }
  mqttConfig = { url, user, pass };
  closeModal();
  addLog('Connecting to ' + url, 'info');

  client = mqtt.connect(url, {
    username: user, password: pass,
    clientId: 'dashboard-' + Math.random().toString(16).slice(2, 8),
    rejectUnauthorized: false,
  });

  client.on('connect', () => {
    isConnected = true;
    setConnected(true);
    addLog('Connected to broker ✓', 'ok');
    client.subscribe('mesh/sensor/+/data');
    client.subscribe('mesh/status/+');
    client.subscribe('mesh/alert/+');
    addLog('Subscribed to mesh/sensor/+/data, mesh/status/+, mesh/alert/+', 'ok');
  });

  client.on('error', err => addLog('Error: ' + err.message, 'err'));

  client.on('close', () => {
    isConnected = false;
    setConnected(false);
    addLog('Disconnected', 'warn');
  });

  client.on('message', (topic, payload) => {
    const raw = payload.toString();
    console.log('MQTT IN | topic:', topic, '| payload:', raw);
    try {
      handleMessage(topic, JSON.parse(raw));
    } catch(e) {
      console.error('Parse error:', e);
      addLog('Bad payload on ' + topic, 'err');
    }
  });
}

function disconnect() {
  if (client) { client.end(); client = null; }
  nodes = {}; alerts = {};
  renderCards(); renderTopology(); renderAlerts();
}

function setConnected(ok) {
  document.getElementById('conn-dot').className    = 'dot' + (ok ? ' online' : '');
  document.getElementById('conn-label').textContent = ok ? 'CONNECTED' : 'DISCONNECTED';
  document.getElementById('conn-btn').textContent   = ok ? 'Disconnect' : 'Connect';
  document.getElementById('conn-btn').className     = 'connect-btn' + (ok ? ' connected' : '');
  document.getElementById('push-btn').disabled      = !ok;
}

// ── Message Handler ───────────────────────────────────────────
function handleMessage(topic, data) {

  // ── mesh/alert/MAC — check FIRST (before status wildcard matches it)
  const alertMatch = topic.match(/^mesh\/alert\/([A-Fa-f0-9]+)$/);
  if (alertMatch) {
    const mac = formatMac(alertMatch[1]);
    console.log('ALERT | mac:', mac, '| data:', data);
    alerts[mac] = { mac, temp: data.temp, smoke: data.smoke,
                    temp_alert: data.temp_alert, smoke_alert: data.smoke_alert,
                    time: new Date() };
    addLog(`⚠️ ALERT from ${mac} — temp=${data.temp}°C smoke=${data.smoke}%`, 'err');
    renderAlerts();
    renderCards();
    renderTopology();
    return;
  }

  // ── mesh/sensor/MAC/data
  const sensorMatch = topic.match(/^mesh\/sensor\/([A-Fa-f0-9]+)\/data$/);
  if (sensorMatch) {
    const mac = formatMac(sensorMatch[1]);
    if (!nodes[mac]) nodes[mac] = { mac, status: 'online', layer: '?', parent: '?', rssi: 0, authenticated: false };
    nodes[mac].temp = data.temp; nodes[mac].smoke = data.smoke;
    nodes[mac].etx  = data.etx;  nodes[mac].hops  = data.hops;
    nodes[mac].lastSeen = new Date();
    renderCards(); renderTopology(); updateNodeCount();
    return;
  }

  // ── mesh/status/MAC
  const statusMatch = topic.match(/^mesh\/status\/(.+)$/);
  if (statusMatch) {
    const key = statusMatch[1];
    const mac = key === 'root' ? key : formatMac(key);
    if (!nodes[mac]) nodes[mac] = { mac };
    Object.assign(nodes[mac], data);
    nodes[mac].lastSeen = new Date();
    renderCards(); renderTopology(); updateNodeCount(); updateNodeSelect();
  }
}

// ── Format MAC ────────────────────────────────────────────────
function formatMac(raw) {
  return raw.replace(/:/g, '').toUpperCase().match(/.{2}/g).join(':');
}

// ── Threshold Push ────────────────────────────────────────────
function pushThreshold() {
  if (!isConnected) return;
  const target   = document.getElementById('thresh-target').value;
  const tempMax  = parseFloat(document.getElementById('thresh-temp').value);
  const smokeMax = parseFloat(document.getElementById('thresh-smoke').value);
  const payload  = JSON.stringify({ temp_max: tempMax, smoke_max: smokeMax });
  const topic    = target === 'all'
    ? 'mesh/config/all/threshold'
    : 'mesh/config/' + target.replace(/:/g, '') + '/threshold';
  client.publish(topic, payload, { qos: 1 });
  addLog(`Pushed threshold → ${topic} : ${payload}`, 'ok');
}

// ── Node Select ───────────────────────────────────────────────
function updateNodeSelect() {
  const sel = document.getElementById('thresh-target');
  const existing = Array.from(sel.options).map(o => o.value);
  Object.keys(nodes).forEach(mac => {
    if (!existing.includes(mac)) {
      const opt = document.createElement('option');
      opt.value = mac; opt.textContent = mac;
      sel.appendChild(opt);
    }
  });
}

// ── Node Count ────────────────────────────────────────────────
function updateNodeCount() {
  const total  = Object.keys(nodes).length;
  const online = Object.values(nodes).filter(n => n.status === 'online').length;
  document.getElementById('node-count').textContent   = `${online}/${total} NODES`;
  document.getElementById('topo-count').textContent   = `${total} nodes`;
  document.getElementById('sensor-count').textContent = `${online} active`;
}

// ── Alerts ────────────────────────────────────────────────────
function renderAlerts() {
  const container = document.getElementById('alert-list');
  const alertList = Object.values(alerts);
  const countEl   = document.getElementById('alert-count');
  countEl.textContent = `${alertList.length} alert${alertList.length !== 1 ? 's' : ''}`;
  countEl.className   = 'badge' + (alertList.length > 0 ? ' alert-badge-active' : ' alert-badge');

  if (alertList.length === 0) {
    container.innerHTML = `<div class="empty-state"><div class="icon">✅</div><div>No active alerts</div></div>`;
    return;
  }
  container.innerHTML = alertList.map(a => {
    const time = new Date(a.time).toTimeString().slice(0, 8);
    return `
      <div class="alert-card">
        <div class="alert-header">
          <span class="alert-mac">${a.mac}</span>
          <span class="alert-time">${time}</span>
          <button class="dismiss-btn" onclick="dismissAlert('${a.mac}')">✕</button>
        </div>
        <div class="alert-body">
          ${a.temp_alert  ? `<span class="alert-tag danger">🌡️ TEMP ${a.temp}°C</span>`   : ''}
          ${a.smoke_alert ? `<span class="alert-tag danger">💨 SMOKE ${a.smoke}%</span>` : ''}
          ${!a.temp_alert && !a.smoke_alert ? `<span class="alert-tag danger">⚠️ ALERT</span>` : ''}
        </div>
      </div>`;
  }).join('');
}

function dismissAlert(mac) {
  delete alerts[mac];
  renderAlerts(); renderCards(); renderTopology();
}

// ── Node Cards ────────────────────────────────────────────────
function renderCards() {
  const container = document.getElementById('node-cards');
  const nodeList  = Object.values(nodes);
  if (nodeList.length === 0) {
    container.innerHTML = `<div class="empty-state"><div class="icon">📡</div><div>No nodes detected yet</div></div>`;
    return;
  }
  container.innerHTML = nodeList.map(n => {
    const tempVal  = n.temp  !== undefined ? n.temp.toFixed(1)  : '--';
    const smokeVal = n.smoke !== undefined ? n.smoke.toFixed(1) : '--';
    const tempMax  = parseFloat(document.getElementById('thresh-temp').value)  || 35;
    const smokeMax = parseFloat(document.getElementById('thresh-smoke').value) || 40;
    const tempClass  = n.temp  > tempMax  ? 'danger' : n.temp  > tempMax  * 0.85 ? 'warn' : '';
    const smokeClass = n.smoke > smokeMax ? 'danger' : n.smoke > smokeMax * 0.85 ? 'warn' : '';
    const cardClass  = (n.status === 'offline') ? 'offline'
                     : alerts[n.mac]            ? 'alerting'
                     : (tempClass === 'danger' || smokeClass === 'danger') ? 'warn' : '';
    const authBadge  = n.authenticated !== undefined
      ? `<span class="auth-badge ${n.authenticated ? 'ok' : 'fail'}">${n.authenticated ? 'AUTH' : 'UNAUTH'}</span>` : '';
    const alertBadge = alerts[n.mac] ? `<span class="alert-indicator">⚠️ ALERT</span>` : '';
    const lastSeen   = n.lastSeen ? new Date(n.lastSeen).toTimeString().slice(0,8) : '--';
    return `
      <div class="node-card ${cardClass}">
        <div class="node-mac">${n.mac}${authBadge}${alertBadge}</div>
        <div class="node-meta">
          <div class="meta-item">STATUS <span>${(n.status||'unknown').toUpperCase()}</span></div>
          <div class="meta-item">LAYER  <span>${n.layer||'?'}</span></div>
          <div class="meta-item">RSSI   <span>${n.rssi||'--'} dBm</span></div>
          <div class="meta-item">LAST   <span>${lastSeen}</span></div>
        </div>
        <div class="sensors">
          <div class="sensor-box"><div class="sensor-label">Temperature</div>
            <div class="sensor-value ${tempClass}">${tempVal}<span class="sensor-unit">°C</span></div></div>
          <div class="sensor-box"><div class="sensor-label">Smoke</div>
            <div class="sensor-value ${smokeClass}">${smokeVal}<span class="sensor-unit">%</span></div></div>
          <div class="sensor-box"><div class="sensor-label">ETX</div>
            <div class="sensor-value">${n.etx !== undefined ? n.etx.toFixed(2) : '--'}</div></div>
          <div class="sensor-box"><div class="sensor-label">Hops</div>
            <div class="sensor-value">${n.hops !== undefined ? n.hops : '--'}</div></div>
        </div>
      </div>`;
  }).join('');
}

// ── Topology ──────────────────────────────────────────────────
function renderTopology() {
  const svg = d3.select('#topology-svg');
  svg.selectAll('*').remove();
  const el = document.getElementById('topology-svg');
  const W = el.clientWidth || 300, H = el.clientHeight || 400;
  const nodeList = Object.values(nodes);
  if (nodeList.length === 0) {
    svg.append('text').attr('x', W/2).attr('y', H/2)
      .attr('text-anchor','middle').attr('fill','#7d8590')
      .attr('font-family','JetBrains Mono, monospace').attr('font-size',11)
      .text('No topology data');
    return;
  }
  const links = [];
  nodeList.forEach(n => { if (n.parent && n.parent !== '?' && nodes[n.parent]) links.push({source:n.parent,target:n.mac}); });
  const simulation = d3.forceSimulation(nodeList)
    .force('link',   d3.forceLink(links).id(d=>d.mac).distance(80))
    .force('charge', d3.forceManyBody().strength(-200))
    .force('center', d3.forceCenter(W/2, H/2))
    .force('y',      d3.forceY(d=>(d.layer||1)*90).strength(0.5));
  const g = svg.append('g');
  svg.call(d3.zoom().on('zoom', e => g.attr('transform', e.transform)));
  const link = g.append('g').selectAll('line').data(links).join('line')
    .attr('stroke','#21262d').attr('stroke-width',1.5).attr('stroke-dasharray','4,3');
  const node = g.append('g').selectAll('g').data(nodeList).join('g')
    .call(d3.drag()
      .on('start',(e,d)=>{if(!e.active)simulation.alphaTarget(0.3).restart();d.fx=d.x;d.fy=d.y;})
      .on('drag', (e,d)=>{d.fx=e.x;d.fy=e.y;})
      .on('end',  (e,d)=>{if(!e.active)simulation.alphaTarget(0);d.fx=null;d.fy=null;}));
  node.append('circle')
    .attr('r', d=>d.layer==1?18:12)
    .attr('fill',   d=>alerts[d.mac]?'rgba(255,59,59,0.2)':d.status==='offline'?'rgba(255,59,59,0.15)':'rgba(0,255,136,0.1)')
    .attr('stroke', d=>alerts[d.mac]?'#ff9900':d.status==='offline'?'#ff3b3b':'#00ff88')
    .attr('stroke-width', d=>d.layer==1?2:1.5);
  node.filter(d=>!!alerts[d.mac]).append('text')
    .attr('text-anchor','middle').attr('dy','-1.4em').attr('font-size',11).text('⚠️');
  node.filter(d=>d.layer==1).append('text')
    .attr('text-anchor','middle').attr('dy','0.35em').attr('font-size',14).text('⬡').attr('fill','#00ff88');
  node.filter(d=>d.layer!=1).append('text')
    .attr('text-anchor','middle').attr('dy','0.35em').attr('font-size',9)
    .attr('fill',d=>d.status==='offline'?'#ff3b3b':'#00ff88').text(d=>'L'+(d.layer||'?'));
  node.append('text').attr('text-anchor','middle').attr('dy',26)
    .attr('font-size',8).attr('font-family','JetBrains Mono, monospace')
    .attr('fill','#7d8590').text(d=>d.mac.slice(-8));
  simulation.on('tick',()=>{
    link.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y).attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
    node.attr('transform',d=>`translate(${d.x},${d.y})`);
  });
}

// ── Log ───────────────────────────────────────────────────────
function addLog(msg, type='info') {
  const panel = document.getElementById('log-panel');
  const time  = new Date().toTimeString().slice(0,8);
  const entry = document.createElement('div');
  entry.className = `log-entry ${type}`;
  entry.innerHTML = `<span class="time">${time}</span><span class="msg">${msg}</span>`;
  panel.appendChild(entry);
  panel.scrollTop = panel.scrollHeight;
}

window.addEventListener('resize', renderTopology);
</script>

<style>
.alert-panel { border: 1px solid rgba(255,59,59,0.3); }
.alert-badge { background:rgba(255,153,0,0.1); color:#7d8590; border:1px solid #21262d; }
.alert-badge-active { background:rgba(255,59,59,0.15); color:#ff3b3b; border:1px solid rgba(255,59,59,0.4); animation:pulse-badge 1.5s ease-in-out infinite; }
@keyframes pulse-badge { 0%,100%{opacity:1;} 50%{opacity:0.6;} }
.alert-card { background:rgba(255,59,59,0.08); border:1px solid rgba(255,59,59,0.3); border-radius:6px; padding:10px 12px; margin-bottom:8px; }
.alert-header { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
.alert-mac { font-family:'JetBrains Mono',monospace; font-size:11px; color:#ff3b3b; flex:1; }
.alert-time { font-size:10px; color:#7d8590; }
.dismiss-btn { background:none; border:none; color:#7d8590; cursor:pointer; font-size:12px; padding:0 4px; }
.dismiss-btn:hover { color:#ff3b3b; }
.alert-body { display:flex; flex-wrap:wrap; gap:6px; }
.alert-tag { display:inline-block; padding:2px 8px; border-radius:4px; font-size:11px; }
.alert-tag.danger { background:rgba(255,59,59,0.15); border:1px solid rgba(255,59,59,0.4); color:#ff3b3b; }
.node-card.alerting { border-color:#ff3b3b; animation:pulse-alert 1.5s ease-in-out infinite; }
@keyframes pulse-alert { 0%,100%{box-shadow:0 0 0 0 rgba(255,59,59,0.4);} 50%{box-shadow:0 0 0 6px rgba(255,59,59,0);} }
.alert-indicator { margin-left:8px; font-size:10px; color:#ff3b3b; font-weight:bold; animation:pulse-badge 1s ease-in-out infinite; }
</style>

</body>
</html>
